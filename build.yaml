---
# jprm plugin manifest -- consumed by `jprm plugin build` and the release workflow.
# See https://github.com/oddstr13/jellyfin-plugin-repository-manager
name: "HTSP Tuner"

# IMPORTANT: this GUID MUST be byte-for-byte identical to the Guid in Plugin.cs
# (MediaBrowser.Common.Plugins.BasePlugin<T>.Id). At the time this file was written
# Plugin.cs did not yet exist in the tree, so the value below is a freshly-generated
# placeholder. Whoever adds Plugin.cs MUST either adopt this GUID or update this line
# to match -- a mismatch makes the server treat the manifest and the assembly as two
# different plugins and the install/update flow breaks silently.
guid: "48472334-959b-4838-a963-3a92e5a603d1"

version: "1.0.0.0"

# targetAbi is a MINIMUM server version, not an exact match: Jellyfin loads the plugin on
# any server whose ABI is >= this value, and HIDES it from any server below it.
# The Live TV API we bind to is unchanged back to 10.10, BUT our assembly is compiled for
# net9.0 and a net8.0 10.10 server physically cannot load it. So the floor is 10.11, which
# is the first net9.0 server release. Do NOT lower this to 10.10.x.
targetAbi: "10.11.0.0"

framework: "net9.0"
owner: "vk496"
category: "LiveTV"
imageUrl: "https://raw.githubusercontent.com/vk496/jellyfin-htsp-tuner/main/logo.png"

overview: "Native HTSP streaming from Tvheadend, remuxed locally to MPEG-TS."

description: >-
  Live TV and DVR for Jellyfin backed by Tvheadend over its native HTSP protocol.
  Unlike the official Tvheadend plugin -- which speaks HTSP only for metadata and then
  pulls the actual video over plain HTTP -- this plugin subscribes to the HTSP stream
  directly and remuxes the elementary streams into MPEG-TS inside Jellyfin. Codec,
  resolution, language and channel layout come straight from the HTSP subscriptionStart
  event; a short, one-time probe of the plugin's own muxed output then fills in the
  fields HTSP cannot carry -- interlacing, HDR/colour, bit depth, profile and level -- so
  Jellyfin makes correct direct-play, deinterlace and transcode decisions. All of this
  happens without opening a second tuner subscription. Add it under Live TV -> Add Tuner
  Device; a matching HTSP guide is registered automatically. Supports multiple Tvheadend
  servers, fast same-multiplex channel switching, radio channels, live EPG pushed over
  async metadata, recording via Jellyfin's DVR, channel tags, stream sharing between
  clients, and tuner/signal statistics.

# Files pulled into the release zip. Only our own assembly ships; Jellyfin's API assemblies
# are already loaded by the server (csproj: ExcludeAssets="runtime" Private="false").
artifacts:
  - "HtspTuner.dll"

# Only the current version's notes -- each release carries just its own changelog.
changelog: |-
  - Fix EPG programme artwork, which never appeared before. Tvheadend sends those images
    as a server path rather than a web address, which Jellyfin could not fetch; the plugin
    now serves them over the HTSP connection it already holds.
  - Fix audio tracks being mis-selected on some TVs. On channels that carry a subtitle
    between the video and the audio, picking "Spanish" could play English, or the wrong
    track, or break the stream -- depending on the TV. Tracks are now ordered so this
    cannot happen.
  - Label audio-description tracks. A description track (narration for the visually
    impaired) is no longer offered as an unmarked, seemingly-muted audio option.
  - Drop DVB teletext subtitles, which Jellyfin cannot display and which broke playback the
    moment they were selected. DVB bitmap subtitles are unaffected.
  - Import Tvheadend channel tags (Sports, HD, Kids...) onto the Jellyfin channels.
  - Show live tuner status on the settings page: what each tuner is watching, its signal,
    and whether frames are being dropped.
  - Suggest the streaming profiles your Tvheadend actually offers instead of a blank box.
  - Optionally refresh Jellyfin's guide when Tvheadend pushes EPG changes (Advanced; off by
    default), and expose the stream analyze duration for faster channel starts (Advanced).
  - Remove settings that never did anything (recording padding, DVR profile UUID).
