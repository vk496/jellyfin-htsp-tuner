<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12B0E8"/>
      <stop offset="1" stop-color="#5A2C82"/>
    </linearGradient>
  </defs>

  <rect width="900" height="400" fill="url(#bg)"/>

  <!-- icon: broadcast tower + waves (left), vertically centred with margins so a wide crop is safe -->
  <g stroke="#ffffff" fill="none" stroke-linecap="round">
    <g stroke-width="13">
      <path d="M198 150 A 66 66 0 0 1 219 103"/>
      <path d="M172 150 A 100 100 0 0 1 203 80"/>
      <path d="M290 150 A 66 66 0 0 0 269 103"/>
      <path d="M316 150 A 100 100 0 0 0 285 80"/>
    </g>
    <g stroke-width="16" stroke-linejoin="round">
      <path d="M204 330 L244 162 L284 330"/>
      <line x1="219" y1="248" x2="269" y2="248"/>
      <line x1="211" y1="292" x2="277" y2="292"/>
    </g>
  </g>
  <circle cx="244" cy="152" r="18" fill="#ffffff"/>
  <rect x="176" y="330" width="136" height="13" rx="6.5" fill="#ffffff"/>

  <!-- wordmark (right) -->
  <text x="410" y="222" font-family="Arial, Helvetica, sans-serif" font-size="112" font-weight="800"
        fill="#ffffff">HTSP</text>
  <text x="414" y="282" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="600"
        letter-spacing="18" fill="#ffffff">TUNER</text>
</svg>
